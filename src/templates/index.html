{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Login Template</title>
  <!-- Import Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Colors based on your design */
      --bg-outside: #e0e4e2;
      --card-bg-right: #1c3b2b; /* Dark Green */
      --card-bg-left: #f0f3f1; /* Light Grey/White */
      
      --form-bg: #224432; /* Slightly lighter green for the form card */
      --input-bg: #57655d; /* Dark grey for inputs */
      --input-text: #e0e5e2;
      --text-white: #ffffff;
      --text-muted: #8d9e95;
      
      --link-color: #4ba398;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-outside);
      font-family: 'Inter', sans-serif;
    }

    /* Main split container with SVG Wave Background */
    .main-container {
      display: flex;
      width: 900px;
      height: 550px;
      border-radius: 35px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
      
      /* Background Image for Container */
      background: url('{% static "images/containterBG-login.png" %}');
      background-size: 120% 120%;
      background-position: center;
      position: relative;
    }

    /* Left Side: Asset Placeholder */
    .left-side {
      flex: 0 0 50%;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .asset-placeholder {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #a8b5ae;
      font-weight: 500;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Petunjuk bagi Anda untuk mengubah gambar */
    .asset-placeholder span {
      z-index: 2;
    }
    
    /* Ganti display:none menjadi block, lalu isi src="" dengan gambar/asset Anda */
    .asset-placeholder img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain; 
      z-index: 1;
    }

    /* Right Side: Form Container */
    .right-side {
      flex: 0 0 50%;
      padding: 50px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .form-card {
      background-color: var(--form-bg);
      border-radius: 25px;
      padding: 35px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      position: relative;
    }

    /* Little icon top right on the form */
    .top-icon {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 25px;
      height: 25px;
      background-color: #aebdaddc;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--card-bg-right);
      font-size: 13px;
      font-weight: 700;
      border-bottom-left-radius: 4px; /* Makes it look like a chat bubble */
    }

    .form-card h2 {
      font-family: 'Playfair Display', serif;
      color: var(--text-white);
      font-size: 42px;
      font-weight: 500;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: var(--text-white);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 20px;
      border-radius: 20px;
      border: none;
      background-color: var(--input-bg);
      color: var(--text-white);
      font-size: 14px;
      outline: none;
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }
    
    .form-group input:focus {
      background-color: #617068;
    }

    .forgot-pass {
      display: block;
      text-align: right;
      color: var(--text-muted);
      font-size: 11px;
      margin-top: 8px;
      text-decoration: none;
    }
    .forgot-pass:hover { text-decoration: underline; }

    /* Neumorphic / Embbosed Login Button */
    button[type="submit"] {
      width: 100%;
      padding: 15px;
      border-radius: 25px;
      border: none;
      background-color: #1c3628;
      /* Inset shadow gives it the pressed-in look from the design */
      box-shadow: inset 5px 5px 10px #13241a, inset -5px -5px 10px #254836;
      color: var(--text-white);
      font-size: 15px;
      font-weight: 600;
      margin-top: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button[type="submit"]:hover {
      background-color: #1a3325;
    }
    button[type="submit"]:active {
      box-shadow: inset 8px 8px 15px #101e15, inset -8px -8px 15px #244634;
    }

    .register-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .register-link a {
      color: var(--link-color);
      text-decoration: none;
    }
    .register-link a:hover {
      text-decoration: underline;
    }

    /* Pesan Error (Messages) */
    .action-panel {
      background: rgba(255, 75, 75, 0.15);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 75, 75, 0.2);
    }
    .action-panel ul {
      list-style: none;
    }
    .action-panel li {
      color: #ff9999;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body background="{% static 'images/bg-login.png' %}" >

  <div class="main-container">

    <!-- BAGIAN KIRI (TEMPAT ASET GAMBAR ANDA) -->
    <div class="left-side">
      <div class="asset-placeholder">
        <img src="{% static 'images/icon-login.png' %}" alt="Illustration" />
      </div>
    </div>

    <!-- BAGIAN KANAN (FORM LOGIN) -->
    <div class="right-side">
      <div class="form-card">
        
        <div class="top-icon">$</div>
        
        <h2>Login</h2>

        {% if messages %}
          <div class="action-panel">
            <ul>
              {% for message in messages %}
                <li>{{ message }}</li>
              {% endfor %}
            </ul>
          </div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          
          <div class="form-group">
            <label for="nama">Username</label>
            <input type="text" id="nama" name="nama" placeholder="Enter Your username" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter Your password" required />
            <a href="#" class="forgot-pass">Forgot Password?</a>
          </div>

          <button type="submit">Login</button>
        </form>

        <div class="register-link">
          Dont have an account? <br>
          <a href="#">Register Now</a>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
